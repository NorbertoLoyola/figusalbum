<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Álbum Mundial 2026 - Oficial</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=JetBrains+Mono:wght@500;700&display=swap');

    :root {
      --mundial-maroon: #8a1538;
      --mundial-dark: #36021b;
      --mundial-gold: #d4af37;
      --mundial-cream: #f6f1e4;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      background: var(--mundial-dark);
      color: var(--mundial-cream);
      font-family: 'Poppins', sans-serif;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(54, 2, 27, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 4px solid var(--mundial-gold);
      padding: 20px 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 22px;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .pct {
      color: var(--mundial-gold);
      font-size: 14px;
      font-weight: 800;
      float: right;
    }

    .bar {
      margin-top: 10px;
      height: 12px;
      border-radius: 999px;
      background: #1a010d;
      border: 1px solid var(--mundial-maroon);
      overflow: hidden;
      clear: both;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--mundial-maroon), var(--mundial-gold));
      transition: width .5s ease-out;
    }

    .stats {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }

    .chip {
      padding: 5px 10px;
      border-radius: 6px;
      font-weight: 700;
      text-transform: uppercase;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    .chip.falta {
      background: #c0392b;
      color: #fff;
    }

    .chip.repe {
      background: var(--mundial-gold);
      color: #000;
    }

    .chip.tengo {
      background: #2e7d4f;
      color: #fff;
    }

    .search {
      margin-top: 15px;
      width: 100%;
      border-radius: 8px;
      background: #240112;
      border: 2px solid var(--mundial-maroon);
      padding: 12px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    .search:focus {
      border-color: var(--mundial-gold);
    }

    .list {
      padding: 16px;
      padding-bottom: 100px;
    }

    .card {
      border-radius: 12px;
      border: 1px solid var(--mundial-maroon);
      background: #4a0e2e;
      margin-bottom: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .card.completa {
      border-color: var(--mundial-gold);
      border-width: 2px;
    }

    .card-head {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px;
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
    }

    .name {
      font-weight: 800;
      font-size: 18px;
      text-align: left;
    }

    .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--mundial-gold);
    }

    .body {
      padding: 0 15px 15px;
      display: none;
      background: rgba(0, 0, 0, 0.1);
    }

    .body.open {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin: 15px 0;
    }

    /* ESTILO CROMO / FIGURITA */
    .num {
      aspect-ratio: 3/4;
      border-radius: 4px;
      border: 1px solid #555;
      font-weight: 800;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s;
    }

    .num:active {
      transform: scale(0.9);
    }

    .num.falta {
      background: #240112;
      border-color: #56042c;
      color: rgba(255, 255, 255, 0.2);
    }

    /* Figurita Pegada */
    .num.tengo {
      background: #fff;
      border-color: #ddd;
      color: var(--mundial-maroon);
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
    }

    /* Figurita Brillante / Repetida */
    .num.repe {
      background: linear-gradient(135deg, #f2b705, #fffbcf);
      border-color: #fff;
      color: #36021b;
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.5), 2px 2px 5px rgba(0, 0, 0, 0.4);
      z-index: 2;
    }

    .apply {
      width: 100%;
      border: none;
      border-radius: 8px;
      background: var(--mundial-gold);
      color: #000;
      font-weight: 800;
      padding: 12px;
      margin-top: 10px;
      cursor: pointer;
      text-transform: uppercase;
    }

    .apply:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

  <div id="root"></div>

  <script>
    const SECCIONES = [
      ["FWC", "Copa Mundial"], ["MEX", "México"], ["RSA", "Sudáfrica"], ["KOR", "Corea del Sur"],
      ["BRA", "Brasil"], ["ARG", "Argentina"], ["FRA", "Francia"], ["GER", "Alemania"],
      ["ESP", "España"], ["ITA", "Italia"], ["ENG", "Inglaterra"], ["NED", "Países Bajos"],
      ["URU", "Uruguay"], ["USA", "USA"], ["CAN", "Canadá"], ["PAN", "Panamá"], ["CC", "Coca Cola"]
    ];
    const TOTAL = 20;
    const KEY = "album-mundial-2026-v2";

    function estadoInicial() {
      const d = {};
      for (const [code] of SECCIONES) {
        d[code] = {};
        for (let n = 1; n <= TOTAL; n++) d[code][n] = "falta"; // Ahora empieza vacío, más lógico
      }
      return d;
    }

    let data = JSON.parse(localStorage.getItem(KEY)) || estadoInicial();
    let query = "";
    let openCode = null;

    function statsGlobales() {
      let falta = 0, repe = 0, tengo = 0, total = 0;
      for (const [code] of SECCIONES) {
        for (let n = 1; n <= TOTAL; n++) {
          total++;
          const s = data[code][n];
          if (s === "falta") falta++;
          else if (s === "repe") { repe++; tengo++; } // FIX: Repe cuenta como Tengo para el %
          else tengo++;
        }
      }
      return { falta, repe, tengo, total, pct: Math.round((tengo / total) * 100) };
    }

    function render() {
      const g = statsGlobales();
      const root = document.getElementById("root");

      root.innerHTML = `
    <div class="header">
      <h1>Álbum Mundial 2026 <span class="pct">${g.pct}%</span></h1>
      <div class="bar"><div class="bar-fill" style="width:${g.pct}%"></div></div>
      <div class="stats">
        <span class="chip falta">Faltan ${g.falta}</span>
        <span class="chip tengo">Tengo ${g.tengo}</span>
        <span class="chip repe">Repetidas ${g.repe}</span>
      </div>
      <input class="search" id="search" placeholder="Buscar país o código..." value="${query}">
    </div>
    <div class="list">
      ${SECCIONES.filter(s => s[1].toLowerCase().includes(query.toLowerCase()) || s[0].toLowerCase().includes(query.toLowerCase()))
          .map(([code, name]) => {
            const isOpen = openCode === code;
            const faltantes = Object.values(data[code]).filter(v => v === "falta").length;
            return `
            <div class="card ${faltantes === 0 ? 'completa' : ''}">
              <button class="card-head" onclick="toggleCard('${code}')">
                <div>
                  <div class="name">${name}</div>
                  <div class="code">${code}</div>
                </div>
                <div class="code">${faltantes === 0 ? '🏆 COMPLETA' : 'Faltan ' + faltantes}</div>
              </button>
              <div class="body ${isOpen ? 'open' : ''}">
                <div class="grid">
                  ${Array.from({ length: TOTAL }, (_, i) => {
              const n = i + 1;
              const est = data[code][n];
              return `<div class="num ${est}" onclick="toggleNum('${code}', ${n})">${n}</div>`;
            }).join('')}
                </div>
                <div style="border-top: 1px solid #666; padding-top:10px;">
                  <label style="font-size:10px; color:var(--mundial-gold)">Carga rápida repetidas (ej: 1, 5, 12):</label>
                  <input id="bulk-${code}" class="search" style="margin-top:5px; padding:8px;" placeholder="Números...">
                  <button class="apply" onclick="applyBulk('${code}')">Aplicar Repetidas</button>
                </div>
              </div>
            </div>
          `;
          }).join('')}
    </div>
  `;

      document.getElementById("search").oninput = (e) => { query = e.target.value; render(); };
    }

    window.toggleCard = (code) => { openCode = openCode === code ? null : code; render(); };

    window.toggleNum = (code, n) => {
      const cur = data[code][n];
      if (cur === "falta") data[code][n] = "tengo";
      else if (cur === "tengo") data[code][n] = "repe";
      else data[code][n] = "falta";
      save();
      render();
    };

    window.applyBulk = (code) => {
      const val = document.getElementById("bulk-" + code).value;
      const nums = val.split(/[,\s]+/).map(n => parseInt(n)).filter(n => !isNaN(n));
      nums.forEach(n => { if (data[code][n]) data[code][n] = "repe"; });
      save();
      render();
    };

    function save() { localStorage.setItem(KEY, JSON.stringify(data)); }

    render();
  </script>
</body>

</html>
