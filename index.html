<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Álbum Mundial 2026</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0c" />
  <style>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; background:#0a0a0c; color:#f7f4ec; font-family: 'Archivo', system-ui, sans-serif; }
  .display { font-family:'Anton', 'Archivo', system-ui, sans-serif; letter-spacing:.02em; }
  .data { font-family:'JetBrains Mono', monospace; }
  .header {
    position: sticky; top:0; z-index:20;
    background:
      radial-gradient(circle at 92% 10%, rgba(212,175,55,.10) 0, transparent 40%),
      repeating-linear-gradient(45deg, rgba(212,175,55,.05) 0 8px, transparent 8px 16px),
      rgba(10,10,12,.97);
    backdrop-filter: blur(6px); border-bottom:4px solid #D4AF37; padding:20px 16px 16px;
  }
  h1 { font-family:'Anton', 'Archivo', system-ui, sans-serif; text-transform:uppercase; letter-spacing:.03em; font-weight:400; font-size:26px; margin:0; display:flex; align-items:center; gap:10px; }
  .badge26 { display:flex; flex-direction:column; align-items:center; justify-content:center; width:34px; height:34px; border:2px solid #D4AF37; border-radius:6px; line-height:1; font-family:'Anton',sans-serif; font-size:12px; color:#D4AF37; flex-shrink:0; }
  .badge26 span { display:block; }
  .pct { color:#D4AF37; font-size:12px; font-weight:700; }
  .bar { margin-top:8px; height:12px; border-radius:999px; background:#161512; border:1px solid #3a3527; overflow:hidden; }
  .bar-fill { height:100%; background:#D4AF37; transition:width .4s; }
  .stats { margin-top:12px; display:flex; gap:8px; font-size:12px; }
  .chip { padding:4px 8px; border-radius:6px; }
  .chip.falta { background:rgba(200,16,46,.2); border:1px solid #c8102e; color:#ff8a75; }
  .chip.repe { background:rgba(212,175,55,.2); border:1px solid #D4AF37; color:#f0d998; }
  .chip.tengo { background:rgba(92,86,72,.3); border:1px solid #5c5648; color:#cbb790; }
  input.search { margin-top:12px; width:100%; border-radius:8px; background:#161512; border:1px solid #3a3527; padding:10px 12px; color:#f7f4ec; font-size:14px; outline:none; }
  input.search:focus { border-color:#D4AF37; }
  .tabs { margin-top:8px; display:flex; gap:4px; overflow-x:auto; }
  .tab { flex-shrink:0; padding:6px 12px; border-radius:999px; font-size:12px; font-weight:700; background:#161512; color:#cbb790; border:1px solid #3a3527; }
  .tab.active { background:#D4AF37; color:#0a0a0c; border-color:#D4AF37; }
  .list { padding:16px; padding-bottom:64px; }
  .card { border-radius:16px; border:2px solid #3a3527; background:#1c1a16; margin-bottom:12px; overflow:hidden; }
  .card.completa { border-color:#D4AF37; background:rgba(212,175,55,.1); }
  .card-head { width:100%; display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:none; border:none; color:inherit; text-align:left; cursor:pointer; }
  .name { font-weight:700; font-size:17px; line-height:1.1; text-transform:uppercase; letter-spacing:.01em; }
  .code { font-size:11px; color:#726b5c; letter-spacing:.05em; }
  .badges { display:flex; align-items:center; gap:8px; font-size:12px; }
  .badge { padding:4px 8px; border-radius:6px; }
  .badge.falta { background:rgba(200,16,46,.25); color:#ff8a75; border:1px solid rgba(200,16,46,.6); }
  .badge.repe { background:rgba(212,175,55,.25); color:#f0d998; border:1px solid rgba(212,175,55,.6); }
  .body { padding: 0 16px 16px; display:none; }
  .body.open { display:block; }
  .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:12px; }
  .num { aspect-ratio:1; border-radius:8px; border:2px solid; font-weight:700; font-size:14px; display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; }
  .num.tengo { background:#0a0a0c; border-color:#5c5648; color:#cbb790; }
  .num.falta { background:#c8102e; border-color:#e5534b; color:#fff; }
  .num.repe { background:#D4AF37; border-color:#f0d998; color:#0a0a0c; }
  .hint { font-size:11px; color:#726b5c; margin-bottom:12px; }
  .bulk { border-top:1px solid #3a3527; padding-top:12px; }
  .bulk label { display:block; font-size:12px; font-weight:700; color:#cbb790; margin-bottom:4px; }
  .bulk input { width:100%; border-radius:8px; background:#0a0a0c; border:1px solid #3a3527; padding:8px 12px; color:#f7f4ec; font-size:14px; outline:none; margin-bottom:10px; }
  .bulk input:focus { border-color:#D4AF37; }
  .apply { width:100%; border:none; border-radius:8px; background:#D4AF37; color:#0a0a0c; font-weight:800; padding:10px; font-size:14px; cursor:pointer; }
  .apply:active { transform:scale(.97); }
  .empty { text-align:center; color:#726b5c; font-size:14px; padding:40px 0; }
  .star { color:#D4AF37; font-size:16px; }
  .share-bar { display:flex; gap:8px; margin-top:12px; }
  .share-btn { flex:1; border:none; border-radius:8px; padding:10px 8px; font-size:12px; font-weight:800; cursor:pointer; }
  .share-btn.falta { background:#c8102e; color:#fff; }
  .share-btn.repe { background:#D4AF37; color:#0a0a0c; }
  .share-btn:active { transform:scale(.97); }
  .shared-view { min-height:100vh; }
  .shared-header { padding:24px 16px; border-bottom:4px solid #D4AF37; }
  .shared-list { padding:16px; }
  .shared-card { border:2px solid #3a3527; border-radius:14px; padding:12px 16px; margin-bottom:10px; background:#1c1a16; }
  .shared-card .name { font-weight:700; font-size:16px; }
  .shared-card .code { font-size:11px; color:#726b5c; margin-bottom:8px; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip-num { padding:4px 10px; border-radius:6px; font-size:13px; font-weight:700; }
  .chip-num.falta { background:#c8102e; color:#fff; }
  .chip-num.repe { background:#D4AF37; color:#0a0a0c; }
  .back-link { display:inline-block; margin:16px; color:#cbb790; font-size:13px; }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px; }
  .modal { background:#1c1a16; border:2px solid #D4AF37; border-radius:14px; padding:20px; max-width:400px; width:100%; }
  .modal p { font-size:13px; color:#cbb790; margin-top:0; }
  .modal input { width:100%; padding:10px; border-radius:8px; border:1px solid #3a3527; background:#0a0a0c; color:#f7f4ec; font-size:12px; font-family:monospace; margin-bottom:12px; }
  .modal button { width:100%; border:none; border-radius:8px; padding:10px; background:#D4AF37; color:#0a0a0c; font-weight:800; cursor:pointer; }
</style>
</style>
</head>

<body>
  <div id="root"></div>
  <script>
    const SECCIONES = [
      ["FWC", "Copa Mundial"], ["MEX", "México"], ["RSA", "Sudáfrica"], ["KOR", "Corea del Sur"],
      ["CZE", "Rep. Checa"], ["CAN", "Canadá"], ["BIH", "Bosnia"], ["QAT", "Catar"],
      ["SUI", "Suiza"], ["BRA", "Brasil"], ["MAR", "Marruecos"], ["HAI", "Haití"],
      ["SCO", "Escocia"], ["USA", "Estados Unidos"], ["PAR", "Paraguay"], ["AUS", "Australia"],
      ["TUR", "Turquía"], ["GER", "Alemania"], ["CUW", "Curazao"], ["CIV", "Costa de Marfil"],
      ["ECU", "Ecuador"], ["NED", "Países Bajos"], ["JPN", "Japón"], ["SWE", "Suecia"],
      ["TUN", "Túnez"], ["BEL", "Bélgica"], ["EGY", "Egipto"], ["IRN", "Irán"],
      ["NZL", "Nueva Zelanda"], ["ESP", "España"], ["CPV", "Cabo Verde"], ["KSA", "Arabia Saudita"],
      ["URU", "Uruguay"], ["FRA", "Francia"], ["SEN", "Senegal"], ["IRQ", "Irak"],
      ["NOR", "Noruega"], ["ARG", "Argentina"], ["ALG", "Argelia"], ["AUT", "Austria"],
      ["JOR", "Jordania"], ["POR", "Portugal"], ["COD", "RD Congo"], ["UZB", "Uzbekistán"],
      ["COL", "Colombia"], ["ENG", "Inglaterra"], ["CRO", "Croacia"], ["GHA", "Ghana"],
      ["PAN", "Panamá"], ["CC", "Especiales"]
    ];
    const TOTAL = 20;
    const ESTADOS = ["tengo", "falta", "repe"];
    const KEY = "album-mundial-2026";

    const FIREBASE_URL = "https://figusalbum-72bc0-default-rtdb.firebaseio.com";

    // Ruta compartida única: los tres celulares leen y escriben el mismo lugar
    function obtenerUrlRemota() {
      return `${FIREBASE_URL}/data.json`;
    }

    function estadoInicial() {
      const d = {};
      for (const [code] of SECCIONES) {
        d[code] = {};
        for (let n = 1; n <= TOTAL; n++) d[code][n] = "tengo";
      }
      return d;
    }
    function cargarLocal() {
      try {
        const raw = localStorage.getItem(KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) { }
      return null;
    }
    function guardarLocal(data) {
      try { localStorage.setItem(KEY, JSON.stringify(data)); } catch (e) { }
    }
    async function cargarRemoto() {
      const res = await fetch(obtenerUrlRemota());
      if (!res.ok) throw new Error("status " + res.status);
      return await res.json();
    }
    async function guardarRemoto(data) {
      await fetch(obtenerUrlRemota(), {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
    }
    function parseNumeros(str) {
      return str.split(/[,\s]+/).map(s => parseInt(s, 10)).filter(n => !isNaN(n) && n >= 1 && n <= TOTAL);
    }

    let data = cargarLocal() || estadoInicial();
    let openCode = null;
    let query = "";
    let tab = "todas";
    let conexionOk = true;

    // FIX EXACTO AL PROBLEMA DEL 100% Y 988%
    function statsGlobales() {
      let falta = 0, repe = 0, tengo = 0, total = 0;
      for (const [code] of SECCIONES) {
        for (let n = 1; n <= TOTAL; n++) {
          total++;
          const s = data[code][n];
          if (s === "falta") falta++;
          else if (s === "repe") {
            repe++;
            tengo++; // Si está repetida, ¡también significa que la tienes en el álbum! Fix matemático.
          }
          else tengo++;
        }
      }
      return { falta, repe, tengo, total, pct: Math.round((tengo / total) * 100) };
    }

    function statsSeccion(code) {
      let falta = 0, repe = 0;
      for (let n = 1; n <= TOTAL; n++) {
        if (data[code][n] === "falta") falta++;
        if (data[code][n] === "repe") repe++;
      }
      return { falta, repe };
    }

    function render() {
      const root = document.getElementById("root");
      const g = statsGlobales();

      const secFiltradas = SECCIONES.filter(([code, name]) => {
        const q = query.toLowerCase();
        const matches = code.toLowerCase().includes(q) || name.toLowerCase().includes(q);
        if (!matches) return false;
        const s = statsSeccion(code);
        if (tab === "falta") return s.falta > 0;
        if (tab === "repe") return s.repe > 0;
        if (tab === "completa") return s.falta === 0;
        return true;
      });

      root.innerHTML = `
    <div class="header">
      <h1><span class="badge26"><span>2</span><span>6</span></span>Álbum Mundial <span class="pct">${g.pct}%</span></h1>
      <div class="data" style="font-size:11px; margin-top:4px; color:${conexionOk ? '#f0d998' : '#ff8a75'};">
        ${conexionOk ? '● Álbum Sincronizado en la Nube' : '○ Sin conexión (guardando local)'}
      </div>
      <div class="bar"><div class="bar-fill" style="width:${g.pct}%"></div></div>
      <div class="stats data">
        <span class="chip falta">Faltan: ${g.falta}</span>
        <span class="chip repe">Repes: ${g.repe}</span>
        <span class="chip tengo">Tengo: ${g.tengo}</span>
      </div>
      <input class="search" id="search" placeholder="Buscar selección (ej: Argentina, MEX)..." value="${query.replace(/"/g, '&quot;')}" />
      <div class="tabs display">
        ${[["todas", "Todas"], ["falta", "Con faltantes"], ["repe", "Con repes"], ["completa", "Completas"]]
          .map(([k, l]) => `<button class="tab ${tab === k ? 'active' : ''}" data-tab="${k}">${l}</button>`).join("")}
      </div>
      <div class="share-bar display">
        <button class="share-btn falta" id="share-falta">🔗 Compartir Faltantes</button>
        <button class="share-btn repe" id="share-repe">🔗 Compartir Repetidas</button>
      </div>
    </div>
    <div class="list">
      ${secFiltradas.length === 0 ? '<div class="empty display">No hay selecciones que coincidan con la búsqueda.</div>' : ''}
      ${secFiltradas.map(([code, name]) => cardHtml(code, name)).join("")}
    </div>
  `;

      document.getElementById("search").addEventListener("input", e => { query = e.target.value; render(); });
      document.getElementById("share-falta").addEventListener("click", () => showShareModal("falta"));
      document.getElementById("share-repe").addEventListener("click", () => showShareModal("repe"));
      document.querySelectorAll(".tab").forEach(el => {
        el.addEventListener("click", () => { tab = el.dataset.tab; render(); });
      });
      document.querySelectorAll(".card-head").forEach(el => {
        el.addEventListener("click", () => {
          const code = el.dataset.code;
          openCode = openCode === code ? null : code;
          render();
        });
      });
      document.querySelectorAll(".num").forEach(el => {
        el.addEventListener("click", () => {
          const code = el.dataset.code, n = el.dataset.n;
          const cur = data[code][n];
          const idx = ESTADOS.indexOf(cur);
          data[code][n] = ESTADOS[(idx + 1) % ESTADOS.length];
          persistir();
          render();
        });
      });

      // FIX AL BOTÓN APLICAR DE CARGA RÁPIDA
      document.querySelectorAll(".apply").forEach(el => {
        el.addEventListener("click", () => {
          const code = el.dataset.code;
          const faltanInput = document.getElementById("faltan-" + code);
          const repesInput = document.getElementById("repes-" + code);
          const faltan = parseNumeros(faltanInput.value);
          const repes = parseNumeros(repesInput.value);
          const section = { ...data[code] };

          for (const n of faltan) section[n] = "falta";
          for (const n of repes) section[n] = "repe"; // Fuerza a grabarse como repetida inmediatamente

          data[code] = section;
          persistir();
          openCode = code;
          render();
        });
      });
    }

    function persistir() {
      guardarLocal(data);
      guardarRemoto(data).then(() => {
        if (!conexionOk) { conexionOk = true; render(); }
      }).catch(() => {
        if (conexionOk) { conexionOk = false; render(); }
      });
    }

    function cardHtml(code, name) {
      const s = statsSeccion(code);
      const completa = s.falta === 0;
      const isOpen = openCode === code;
      let gridHtml = "";
      for (let n = 1; n <= TOTAL; n++) {
        const est = data[code][n];
        gridHtml += `<div class="num ${est}" data-code="${code}" data-n="${n}">${n}</div>`;
      }
      return `
    <div class="card ${completa ? 'completa' : ''}">
      <button class="card-head" data-code="${code}">
        <div>
          <div class="name display">${name}</div>
          <div class="code data">${code}</div>
        </div>
        <div class="badges data">
          ${s.falta > 0 ? `<span class="badge falta">-${s.falta}</span>` : ''}
          ${s.repe > 0 ? `<span class="badge repe">x${s.repe}</span>` : ''}
          ${completa ? '<span class="star">★</span>' : ''}
          <span style="color:#D4AF37; font-size: 10px;">${isOpen ? '▲' : '▼'}</span>
        </div>
      </button>
      <div class="body ${isOpen ? 'open' : ''}">
        <div class="grid">${gridHtml}</div>
        <div class="hint data">Modo manual: Toca un número para alternar (Tengo → Falta → Repetida)</div>
        <div class="bulk">
          <label>Cargar en lote: Números que te FALTAN</label>
          <input id="faltan-${code}" placeholder="ej: 3, 7, 12, 18" />
          <label>Números REPETIDOS</label>
          <input id="repes-${code}" placeholder="ej: 4, 9, 20" />
          <button class="apply display" data-code="${code}">Aplicar Cambios</button>
        </div>
      </div>
    </div>
  `;
    }

    function encodeData(type) {
      const parts = [];
      for (const [code] of SECCIONES) {
        const nums = [];
        for (let n = 1; n <= TOTAL; n++) if (data[code][n] === type) nums.push(n);
        if (nums.length) parts.push(code + ":" + nums.join(","));
      }
      return btoa(unescape(encodeURIComponent(parts.join(";"))));
    }
    function decodeData(b64) {
      const raw = decodeURIComponent(escape(atob(b64)));
      const result = {};
      raw.split(";").filter(Boolean).forEach(p => {
        const [code, nums] = p.split(":");
        result[code] = nums.split(",").map(Number);
      });
      return result;
    }
    function buildShareUrl(type) {
      const base = location.origin + location.pathname;
      return `${base}#ver=${type}:${encodeData(type)}`;
    }
    function showShareModal(type) {
      const url = buildShareUrl(type);
      const titulo = type === "falta" ? "Figuritas que te Faltan" : "Figuritas Repetidas";
      const bg = document.createElement("div");
      bg.className = "modal-bg";
      bg.innerHTML = `
    <div class="modal">
      <div class="name display" style="margin-bottom:6px; font-size: 22px; color: #fff;">${titulo}</div>
      <p>Copia el siguiente enlace para enviárselo a tus amigos. Es una vista limpia de solo lectura.</p>
      <input readonly id="share-url-input" value="${url}" />
      <button class="display" id="copy-btn">Copiar Enlace</button>
    </div>
  `;
      document.body.appendChild(bg);
      bg.addEventListener("click", (e) => { if (e.target === bg) bg.remove(); });
      const input = bg.querySelector("#share-url-input");
      bg.querySelector("#copy-btn").addEventListener("click", async () => {
        input.select();
        input.setSelectionRange(0, 99999);
        try {
          await navigator.clipboard.writeText(url);
          bg.querySelector("#copy-btn").textContent = "¡Copiado con éxito!";
        } catch (e) {
          document.execCommand("copy");
          bg.querySelector("#copy-btn").textContent = "¡Copiado con éxito!";
        }
        setTimeout(() => bg.remove(), 900);
      });
    }

    function renderSharedView(type, encoded) {
      const nums = decodeData(encoded);
      const codes = Object.keys(nums);
      const titulo = type === "falta" ? "Lista de Faltantes" : "Lista de Repetidas";
      const claseChip = type === "falta" ? "falta" : "repe";
      const root = document.getElementById("root");
      root.innerHTML = `
    <div style="min-height:100vh; background:#0a0a0c; padding-bottom: 40px;">
      <div class="header">
        <h1 class="display">${titulo}</h1>
        <div class="data" style="color:#f0d998;font-size:13px;margin-top:4px;">Álbum Mundial 2026 · Vista de solo lectura</div>
      </div>
      <div class="list">
        ${codes.length === 0 ? '<div class="empty display">No hay figuritas en esta lista pública.</div>' : ''}
        ${codes.map(code => {
        const nombre = (SECCIONES.find(s => s[0] === code) || [code, code])[1];
        return `
            <div class="card" style="padding: 14px 18px;">
              <div class="name display" style="font-size:18px;">${nombre}</div>
              <div class="code data" style="margin-bottom:8px;">${code}</div>
              <div style="display:flex; flex-wrap:wrap; gap:6px;">
                ${nums[code].map(n => `<span class="num ${claseChip}" style="width:36px; height:36px; font-size:13px; cursor:default; transform:none; box-shadow:none;">${n}</span>`).join("")}
              </div>
            </div>
          `;
      }).join("")}
      </div>
      <center><a class="display" style="color:#D4AF37; font-size:14px; font-weight:700; text-decoration:none;" href="${location.pathname}">Volver a mi Álbum Personal</a></center>
    </div>
  `;
    }

    async function sincronizarRemoto(silencioso) {
      try {
        const remoto = await cargarRemoto();
        if (remoto) {
          if (!silencioso || openCode === null) {
            data = remoto;
            guardarLocal(data);
            if (!conexionOk) { conexionOk = true; }
            render();
          }
        } else {
          await guardarRemoto(data);
        }
        conexionOk = true;
      } catch (e) {
        conexionOk = false;
        if (!silencioso) render();
      }
    }

    function init() {
      const hash = location.hash;
      const match = hash.match(/^#ver=(falta|repe):(.+)$/);
      if (match) {
        renderSharedView(match[1], match[2]);
        return;
      }
      render();
      sincronizarRemoto(false);
      setInterval(() => sincronizarRemoto(true), 8000);
    }
    init();
  </script>
</body>

</html>
