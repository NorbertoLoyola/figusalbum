<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Álbum Mundial 2026</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#141414" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; background:#F0EAD8; color:#1c1a16; font-family: 'Archivo', system-ui, sans-serif; }
    .display { font-family:'Anton', 'Archivo', system-ui, sans-serif; letter-spacing:.02em; }
    .data { font-family:'JetBrains Mono', monospace; }

    .header { position: sticky; top:0; z-index:20; background:#141414; padding:18px 16px 16px; border-bottom:5px solid #D4AF37; }
    h1 { font-family:'Anton','Archivo',system-ui,sans-serif; text-transform:uppercase; letter-spacing:.03em; font-weight:400; font-size:24px; margin:0; display:flex; align-items:center; gap:10px; color:#fff; }

    /* Mosaico "26" multicolor, como el emblema oficial */
    .badge26 { display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; width:38px; height:38px; border-radius:8px; overflow:hidden; flex-shrink:0; box-shadow:0 2px 6px rgba(0,0,0,.4); }
    .badge26 i { display:block; }
    .badge26 i:nth-child(1) { background:#E4572E; }
    .badge26 i:nth-child(2) { background:#2FA88F; }
    .badge26 i:nth-child(3) { background:#2E6FBA; }
    .badge26 i:nth-child(4) { background:#F4CC3B; }

    .pct { color:#D4AF37; font-size:13px; font-weight:700; }
    .bar { margin-top:10px; height:12px; border-radius:999px; background:#2a2a2a; border:1px solid #3a3a3a; overflow:hidden; }
    .bar-fill { height:100%; background:linear-gradient(90deg,#E4572E,#F4CC3B,#2FA88F,#2E6FBA); transition:width .4s; }
    .stats { margin-top:12px; display:flex; gap:8px; font-size:12px; }
    .chip { padding:4px 9px; border-radius:6px; font-weight:700; }
    .chip.falta { background:#FCE4E4; border:1px solid #c8102e; color:#a30f22; }
    .chip.repe { background:#FEF3D6; border:1px solid #D4AF37; color:#8a6d10; }
    .chip.tengo { background:#e7e4da; border:1px solid #9a9384; color:#4a4636; }
    input.search { margin-top:12px; width:100%; border-radius:8px; background:#1f1f1f; border:1px solid #3a3a3a; padding:10px 12px; color:#f7f4ec; font-size:14px; outline:none; }
    input.search:focus { border-color:#D4AF37; }
    .tabs { margin-top:8px; display:flex; gap:4px; overflow-x:auto; }
    .tab { flex-shrink:0; padding:6px 12px; border-radius:999px; font-size:12px; font-weight:700; background:#1f1f1f; color:#cbb790; border:1px solid #3a3a3a; }
    .tab.active { background:#D4AF37; color:#141414; border-color:#D4AF37; }

    .list { padding:16px; padding-bottom:64px; }
    .card { border-radius:14px; border:1px solid #ddd3b8; background:#FFFDF7; margin-bottom:12px; overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,.06); border-left:6px solid #ddd3b8; }
    .card.completa { border-left-color:#D4AF37; background:#FFFBEA; }
    .card-head { width:100%; display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:none; border:none; color:inherit; text-align:left; cursor:pointer; }
    .name { font-weight:700; font-size:17px; line-height:1.1; text-transform:uppercase; letter-spacing:.01em; color:#1c1a16; }
    .code { font-size:11px; color:#9a9384; letter-spacing:.05em; }
    .badges { display:flex; align-items:center; gap:8px; font-size:12px; }
    .badge { padding:4px 8px; border-radius:6px; font-weight:700; }
    .badge.falta { background:#FCE4E4; color:#a30f22; border:1px solid #c8102e; }
    .badge.repe { background:#FEF3D6; color:#8a6d10; border:1px solid #D4AF37; }
    .body { padding: 0 16px 16px; display:none; }
    .body.open { display:block; }
    .grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:10px; }
    .num { aspect-ratio:1; border-radius:6px; border:1.5px solid; font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; }
    .num.tengo { background:#F0EAD8; border-color:#c9bfa0; color:#6b6555; }
    .num.falta { background:#D4372B; border-color:#a30f22; color:#fff; }
    .num.repe { background:#D4AF37; border-color:#8a6d10; color:#141414; }
    .hint { font-size:11px; color:#9a9384; margin-bottom:12px; }
    .legend { display:flex; gap:14px; font-size:11px; color:#6b6555; margin-bottom:10px; flex-wrap:wrap; }
    .legend span { display:inline-flex; align-items:center; gap:5px; }
    .legend i { width:12px; height:12px; border-radius:3px; display:inline-block; border:1.5px solid; }
    .legend i.tengo { background:#F0EAD8; border-color:#c9bfa0; }
    .legend i.falta { background:#D4372B; border-color:#a30f22; }
    .legend i.repe { background:#D4AF37; border-color:#8a6d10; }
    .bulk { border-top:1px solid #eee3c8; padding-top:12px; }
    .bulk label { display:block; font-size:12px; font-weight:700; color:#6b6555; margin-bottom:4px; }
    .bulk input { width:100%; border-radius:8px; background:#F0EAD8; border:1px solid #ddd3b8; padding:8px 12px; color:#1c1a16; font-size:14px; outline:none; margin-bottom:10px; }
    .bulk input:focus { border-color:#D4AF37; }
    .apply { width:100%; border:none; border-radius:8px; background:#141414; color:#D4AF37; font-weight:800; padding:10px; font-size:14px; cursor:pointer; }
    .apply:active { transform:scale(.97); }
    .empty { text-align:center; color:#9a9384; font-size:14px; padding:40px 0; }
    .star { color:#D4AF37; font-size:16px; }
    .share-bar { display:flex; gap:8px; margin-top:12px; }
    .share-btn { flex:1; border:none; border-radius:8px; padding:10px 8px; font-size:12px; font-weight:800; cursor:pointer; }
    .share-btn.falta { background:#D4372B; color:#fff; }
    .share-btn.repe { background:#D4AF37; color:#141414; }
    .share-btn:active { transform:scale(.97); }
    .shared-view { min-height:100vh; }
    .shared-header { padding:24px 16px; border-bottom:5px solid #D4AF37; background:#141414; }
    .shared-list { padding:16px; }
    .shared-card { border:1px solid #ddd3b8; border-radius:14px; padding:12px 16px; margin-bottom:10px; background:#FFFDF7; }
    .shared-card .name { font-weight:700; font-size:16px; }
    .shared-card .code { font-size:11px; color:#9a9384; margin-bottom:8px; }
    .chips { display:flex; flex-wrap:wrap; gap:6px; }
    .chip-num { padding:4px 10px; border-radius:6px; font-size:13px; font-weight:700; }
    .chip-num.falta { background:#D4372B; color:#fff; }
    .chip-num.repe { background:#D4AF37; color:#141414; }
    .back-link { display:inline-block; margin:16px; color:#8a6d10; font-size:13px; }
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px; }
    .modal { background:#FFFDF7; border:2px solid #D4AF37; border-radius:14px; padding:20px; max-width:400px; width:100%; }
    .modal p { font-size:13px; color:#6b6555; margin-top:0; }
    .modal input { width:100%; padding:10px; border-radius:8px; border:1px solid #ddd3b8; background:#F0EAD8; color:#1c1a16; font-size:12px; font-family:monospace; margin-bottom:12px; }
    .modal button { width:100%; border:none; border-radius:8px; padding:10px; background:#D4AF37; color:#141414; font-weight:800; cursor:pointer; }
  </style>

<body>
  <div id="root"></div>
  <script>
    const SECCIONES = [
      ["FWC", "Copa Mundial"], ["MEX", "México"], ["RSA", "Sudáfrica"], ["KOR", "Corea del Sur"],
      ["CZE", "Rep. Checa"], ["CAN", "Canadá"], ["BIH", "Bosnia"], ["QAT", "Catar"],
      ["SUI", "Suiza"], ["BRA", "Brasil"], ["MAR", "Marruecos"], ["HAI", "Haití"],
      ["SCO", "Escocia"], ["USA", "Estados Unidos"], ["PAR", "Paraguay"], ["AUS", "Australia"],
      ["TUR", "Turquía"], ["GER", "Alemania"], ["CUW", "Curazao"], ["CIV", "Costa de Marfil"],
      ["ECU", "Ecuador"], ["NED", "Países Bajos"], ["JPN", "Japón"], ["SWE", "Suecia"],
      ["TUN", "Túnez"], ["BEL", "Bélgica"], ["EGY", "Egipto"], ["IRN", "Irán"],
      ["NZL", "Nueva Zelanda"], ["ESP", "España"], ["CPV", "Cabo Verde"], ["KSA", "Arabia Saudita"],
      ["URU", "Uruguay"], ["FRA", "Francia"], ["SEN", "Senegal"], ["IRQ", "Irak"],
      ["NOR", "Noruega"], ["ARG", "Argentina"], ["ALG", "Argelia"], ["AUT", "Austria"],
      ["JOR", "Jordania"], ["POR", "Portugal"], ["COD", "RD Congo"], ["UZB", "Uzbekistán"],
      ["COL", "Colombia"], ["ENG", "Inglaterra"], ["CRO", "Croacia"], ["GHA", "Ghana"],
      ["PAN", "Panamá"], ["CC", "Especiales"]
    ];
    const TOTAL = 20;
    const ESTADOS = ["tengo", "falta", "repe"];
    const KEY = "album-mundial-2026";

    const FIREBASE_URL = "https://figusalbum-72bc0-default-rtdb.firebaseio.com";

    // Ruta compartida única: los tres celulares leen y escriben el mismo lugar
    function obtenerUrlRemota() {
      return `${FIREBASE_URL}/data.json`;
    }

    function estadoInicial() {
      const d = {};
      for (const [code] of SECCIONES) {
        d[code] = {};
        for (let n = 1; n <= TOTAL; n++) d[code][n] = "tengo";
      }
      return d;
    }
    function cargarLocal() {
      try {
        const raw = localStorage.getItem(KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) { }
      return null;
    }
    function guardarLocal(data) {
      try { localStorage.setItem(KEY, JSON.stringify(data)); } catch (e) { }
    }
    async function cargarRemoto() {
      const res = await fetch(obtenerUrlRemota());
      if (!res.ok) throw new Error("status " + res.status);
      return await res.json();
    }
    async function guardarRemoto(data) {
      await fetch(obtenerUrlRemota(), {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
    }
    function parseNumeros(str) {
      return str.split(/[,\s]+/).map(s => parseInt(s, 10)).filter(n => !isNaN(n) && n >= 1 && n <= TOTAL);
    }

    let data = cargarLocal() || estadoInicial();
    let openCode = null;
    let query = "";
    let tab = "todas";
    let conexionOk = true;

    // FIX EXACTO AL PROBLEMA DEL 100% Y 988%
    function statsGlobales() {
      let falta = 0, repe = 0, tengo = 0, total = 0;
      for (const [code] of SECCIONES) {
        for (let n = 1; n <= TOTAL; n++) {
          total++;
          const s = data[code][n];
          if (s === "falta") falta++;
          else if (s === "repe") {
            repe++;
            tengo++; // Si está repetida, ¡también significa que la tienes en el álbum! Fix matemático.
          }
          else tengo++;
        }
      }
      return { falta, repe, tengo, total, pct: Math.round((tengo / total) * 100) };
    }

    function statsSeccion(code) {
      let falta = 0, repe = 0;
      for (let n = 1; n <= TOTAL; n++) {
        if (data[code][n] === "falta") falta++;
        if (data[code][n] === "repe") repe++;
      }
      return { falta, repe };
    }

    function render() {
      const root = document.getElementById("root");
      const g = statsGlobales();

      const secFiltradas = SECCIONES.filter(([code, name]) => {
        const q = query.toLowerCase();
        const matches = code.toLowerCase().includes(q) || name.toLowerCase().includes(q);
        if (!matches) return false;
        const s = statsSeccion(code);
        if (tab === "falta") return s.falta > 0;
        if (tab === "repe") return s.repe > 0;
        if (tab === "completa") return s.falta === 0;
        return true;
      });

      root.innerHTML = `
    <div class="header">
      <h1><span class="badge26"><i></i><i></i><i></i><i></i></span>Álbum Mundial <span class="pct">${g.pct}%</span></h1>
      <div class="data" style="font-size:11px; margin-top:4px; color:${conexionOk ? '#f0d998' : '#ff8a75'};">
        ${conexionOk ? '● Álbum Sincronizado en la Nube' : '○ Sin conexión (guardando local)'}
      </div>
      <div class="bar"><div class="bar-fill" style="width:${g.pct}%"></div></div>
      <div class="stats data">
        <span class="chip falta">Faltan: ${g.falta}</span>
        <span class="chip repe">Repes: ${g.repe}</span>
        <span class="chip tengo">Tengo: ${g.tengo}</span>
      </div>
      <input class="search" id="search" placeholder="Buscar selección (ej: Argentina, MEX)..." value="${query.replace(/"/g, '&quot;')}" />
      <div class="tabs display">
        ${[["todas", "Todas"], ["falta", "Con faltantes"], ["repe", "Con repes"], ["completa", "Completas"]]
          .map(([k, l]) => `<button class="tab ${tab === k ? 'active' : ''}" data-tab="${k}">${l}</button>`).join("")}
      </div>
      <div class="share-bar display">
        <button class="share-btn falta" id="share-falta">🔗 Compartir Faltantes</button>
        <button class="share-btn repe" id="share-repe">🔗 Compartir Repetidas</button>
      </div>
    </div>
    <div class="list">
      ${secFiltradas.length === 0 ? '<div class="empty display">No hay selecciones que coincidan con la búsqueda.</div>' : ''}
      ${secFiltradas.map(([code, name]) => cardHtml(code, name)).join("")}
    </div>
  `;

      document.getElementById("search").addEventListener("input", e => {
        query = e.target.value;
        const cursorPos = e.target.selectionStart;
        render();
        const nuevoInput = document.getElementById("search");
        nuevoInput.focus();
        nuevoInput.setSelectionRange(cursorPos, cursorPos);
      });
      document.getElementById("share-falta").addEventListener("click", () => showShareModal("falta"));
      document.getElementById("share-repe").addEventListener("click", () => showShareModal("repe"));
      document.querySelectorAll(".tab").forEach(el => {
        el.addEventListener("click", () => { tab = el.dataset.tab; render(); });
      });
      document.querySelectorAll(".card-head").forEach(el => {
        el.addEventListener("click", () => {
          const code = el.dataset.code;
          openCode = openCode === code ? null : code;
          render();
        });
      });
      document.querySelectorAll(".num").forEach(el => {
        el.addEventListener("click", () => {
          const code = el.dataset.code, n = el.dataset.n;
          const cur = data[code][n];
          const idx = ESTADOS.indexOf(cur);
          data[code][n] = ESTADOS[(idx + 1) % ESTADOS.length];
          persistir();
          render();
        });
      });

      // FIX AL BOTÓN APLICAR DE CARGA RÁPIDA
      document.querySelectorAll(".apply").forEach(el => {
        el.addEventListener("click", () => {
          const code = el.dataset.code;
          const faltanInput = document.getElementById("faltan-" + code);
          const repesInput = document.getElementById("repes-" + code);
          const faltan = parseNumeros(faltanInput.value);
          const repes = parseNumeros(repesInput.value);
          const section = { ...data[code] };

          for (const n of faltan) section[n] = "falta";
          for (const n of repes) section[n] = "repe"; // Fuerza a grabarse como repetida inmediatamente

          data[code] = section;
          persistir();
          openCode = code;
          render();
        });
      });
    }

    function persistir() {
      guardarLocal(data);
      guardarRemoto(data).then(() => {
        if (!conexionOk) { conexionOk = true; render(); }
      }).catch(() => {
        if (conexionOk) { conexionOk = false; render(); }
      });
    }

    function cardHtml(code, name) {
      const s = statsSeccion(code);
      const completa = s.falta === 0;
      const isOpen = openCode === code;
      let gridHtml = "";
      for (let n = 1; n <= TOTAL; n++) {
        const est = data[code][n];
        gridHtml += `<div class="num ${est}" data-code="${code}" data-n="${n}">${n}</div>`;
      }
      return `
    <div class="card ${completa ? 'completa' : ''}">
      <button class="card-head" data-code="${code}">
        <div>
          <div class="name display">${name}</div>
          <div class="code data">${code}</div>
        </div>
        <div class="badges data">
          ${s.falta > 0 ? `<span class="badge falta">-${s.falta}</span>` : ''}
          ${s.repe > 0 ? `<span class="badge repe">x${s.repe}</span>` : ''}
          ${completa ? '<span class="star">★</span>' : ''}
          <span style="color:#D4AF37; font-size: 10px;">${isOpen ? '▲' : '▼'}</span>
        </div>
      </button>
      <div class="body ${isOpen ? 'open' : ''}">
        <div class="grid">${gridHtml}</div>
        <div class="legend data">
          <span><i class="tengo"></i>Tengo</span>
          <span><i class="falta"></i>Falta</span>
          <span><i class="repe"></i>Repetida</span>
        </div>
        <div class="hint data">Tocá un número para pasar: Tengo → Falta → Repetida</div>
        <div class="bulk">
          <label>Cargar en lote: Números que te FALTAN</label>
          <input id="faltan-${code}" placeholder="ej: 3, 7, 12, 18" />
          <label>Números REPETIDOS</label>
          <input id="repes-${code}" placeholder="ej: 4, 9, 20" />
          <button class="apply display" data-code="${code}">Aplicar Cambios</button>
        </div>
      </div>
    </div>
  `;
    }

    function datosParaCompartir(type) {
      const result = {};
      for (const [code] of SECCIONES) {
        const nums = [];
        for (let n = 1; n <= TOTAL; n++) if (data[code][n] === type) nums.push(n);
        if (nums.length) result[code] = nums;
      }
      return result;
    }
    function idCorto() {
      return Math.random().toString(36).substring(2, 8);
    }
    async function showShareModal(type) {
      const titulo = type === "falta" ? "Figuritas que te Faltan" : "Figuritas Repetidas";
      const bg = document.createElement("div");
      bg.className = "modal-bg";
      bg.innerHTML = `
    <div class="modal">
      <div class="name display" style="margin-bottom:6px; font-size: 22px; color: #1c1a16;">${titulo}</div>
      <p id="share-status">Generando enlace corto...</p>
      <input readonly id="share-url-input" style="display:none;" />
      <button class="display" id="copy-btn" style="display:none;">Copiar Enlace</button>
    </div>
  `;
      document.body.appendChild(bg);
      bg.addEventListener("click", (e) => { if (e.target === bg) bg.remove(); });
      try {
        const id = idCorto();
        const payload = datosParaCompartir(type);
        await fetch(`${FIREBASE_URL}/shares/${id}.json`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const url = `${location.origin}${location.pathname}#ver=${type}:${id}`;
        bg.querySelector("#share-status").textContent = "Copiá el siguiente enlace para enviárselo a tus amigos. Es una vista de solo lectura.";
        const input = bg.querySelector("#share-url-input");
        input.style.display = "block";
        input.value = url;
        const btn = bg.querySelector("#copy-btn");
        btn.style.display = "block";
        btn.addEventListener("click", async () => {
          input.select();
          input.setSelectionRange(0, 99999);
          try {
            await navigator.clipboard.writeText(url);
            btn.textContent = "¡Copiado con éxito!";
          } catch (e) {
            document.execCommand("copy");
            btn.textContent = "¡Copiado con éxito!";
          }
          setTimeout(() => bg.remove(), 900);
        });
      } catch (e) {
        bg.querySelector("#share-status").textContent = "Hubo un error generando el enlace: " + e.message;
      }
    }

    async function renderSharedView(type, id) {
      const titulo = type === "falta" ? "Lista de Faltantes" : "Lista de Repetidas";
      const claseChip = type === "falta" ? "falta" : "repe";
      const root = document.getElementById("root");
      root.innerHTML = `
    <div style="min-height:100vh; background:#F0EAD8; padding-bottom: 40px;">
      <div class="header">
        <h1><span class="badge26"><i></i><i></i><i></i><i></i></span>${titulo}</h1>
        <div class="data" style="color:#f0d998;font-size:13px;margin-top:4px;">Álbum Mundial 2026 · Vista de solo lectura</div>
      </div>
      <div class="list" id="shared-list">
        <div class="empty display">Cargando...</div>
      </div>
    </div>
  `;
      let nums = {};
      try {
        const res = await fetch(`${FIREBASE_URL}/shares/${id}.json`);
        nums = (await res.json()) || {};
      } catch (e) {}
      const codes = Object.keys(nums);
      const listEl = document.getElementById("shared-list");
      listEl.innerHTML = `
        ${codes.length === 0 ? '<div class="empty display">No hay figuritas en esta lista, o el enlace expiró.</div>' : ''}
        ${codes.map(code => {
        const nombre = (SECCIONES.find(s => s[0] === code) || [code, code])[1];
        return `
            <div class="card" style="padding: 14px 18px;">
              <div class="name display" style="font-size:18px;">${nombre}</div>
              <div class="code data" style="margin-bottom:8px;">${code}</div>
              <div style="display:flex; flex-wrap:wrap; gap:6px;">
                ${nums[code].map(n => `<span class="num ${claseChip}" style="width:36px; height:36px; font-size:13px; cursor:default;">${n}</span>`).join("")}
              </div>
            </div>
          `;
      }).join("")}
        <center style="margin-top:16px;"><a class="display" style="color:#8a6d10; font-size:14px; font-weight:700; text-decoration:none;" href="${location.pathname}">Volver a mi Álbum Personal</a></center>
      `;
    }

    async function sincronizarRemoto(silencioso) {
      try {
        const remoto = await cargarRemoto();
        if (remoto) {
          if (!silencioso || openCode === null) {
            data = remoto;
            guardarLocal(data);
            if (!conexionOk) { conexionOk = true; }
            render();
          }
        } else {
          await guardarRemoto(data);
        }
        conexionOk = true;
      } catch (e) {
        conexionOk = false;
        if (!silencioso) render();
      }
    }

    function init() {
      const hash = location.hash;
      const match = hash.match(/^#ver=(falta|repe):(.+)$/);
      if (match) {
        renderSharedView(match[1], match[2]);
        return;
      }
      render();
      sincronizarRemoto(false);
      setInterval(() => sincronizarRemoto(true), 8000);
    }
    init();
  </script>
</body>
